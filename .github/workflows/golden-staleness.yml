name: golden-staleness
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install PyTorch + numpy
        run: pip install torch==2.12.1 numpy==2.5.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Regenerate golden files
        run: python3 tests/golden/generate_golden.py
      - name: Check for drift
        run: |
          if ! git diff --exit-code tests/golden/layers/; then
            echo "::error::Golden files are stale. Run 'python3 tests/golden/generate_golden.py' and commit the result."
            exit 1
          fi
