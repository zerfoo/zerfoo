name: arm64-build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
concurrency:
  group: arm64-build-${{ github.ref }}
  cancel-in-progress: true
env:
  GONOSUMDB: 'github.com/zerfoo/*'
  GONOPROXY: 'github.com/zerfoo/*'
jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: Cache Go build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.26-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-1.26-${{ matrix.goos }}-${{ matrix.goarch }}-
      - name: Vet
        run: go vet ./cmd/zerfoo-edge/...
      - name: Build zerfoo-edge
        run: go build -o zerfoo-edge-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/zerfoo-edge/...
      - name: Verify binary exists
        run: test -f zerfoo-edge-${{ matrix.goos }}-${{ matrix.goarch }}
