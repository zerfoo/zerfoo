apiVersion: v1
kind: ConfigMap
metadata:
  name: modelcache-config
  namespace: zerfoo
  labels:
    app.kubernetes.io/name: modelcache
    app.kubernetes.io/part-of: zerfoo
data:
  CACHE_DIR: "/models"
  CACHE_MAX_SIZE: "10737418240"  # 10 GiB
  PREFETCH_REFS: ""              # comma-separated model refs to prefetch on startup
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: modelcache
  namespace: zerfoo
  labels:
    app.kubernetes.io/name: modelcache
    app.kubernetes.io/part-of: zerfoo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: modelcache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modelcache
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: modelcache
          image: ghcr.io/zerfoo/modelcache:latest
          envFrom:
            - configMapRef:
                name: modelcache-config
          volumeMounts:
            - name: model-store
              mountPath: /models
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "20Gi"
      volumes:
        - name: model-store
          hostPath:
            path: /var/lib/zerfoo/models
            type: DirectoryOrCreate
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
