replicaCount: 1

image:
  repository: ghcr.io/zerfoo/zerfoo
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

model:
  name: ""
  quantization: "Q4_K_M"
  cacheDir: /models

server:
  port: 8080

env: []
  # - name: ZERFOO_LOG_LEVEL
  #   value: "info"

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi
    # nvidia.com/gpu: "1"

nodeSelector: {}

tolerations: []
  # - key: nvidia.com/gpu
  #   operator: Exists
  #   effect: NoSchedule

affinity: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: zerfoo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: zerfoo-tls
  #    hosts:
  #      - zerfoo.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

networkPolicy:
  enabled: false
  ingressNamespace: ingress-nginx

podAnnotations: {}
podLabels: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5

volumes: []
  # - name: model-storage
  #   persistentVolumeClaim:
  #     claimName: zerfoo-models

volumeMounts: []
  # - name: model-storage
  #   mountPath: /models
